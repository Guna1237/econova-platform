databases:
  - name: econova-db
    databaseName: econova
    user: econovagame
    plan: starter            # 1GB RAM, 10GB storage, 25 connections — stable for 30 teams

services:
  - type: web
    name: econova-backend
    env: python
    region: oregon
    plan: standard
    buildCommand: pip install -r backend/requirements.txt
    startCommand: >
      uvicorn backend.main:app
      --host 0.0.0.0
      --port $PORT
      --workers 1
      --timeout-keep-alive 65
      --limit-max-requests 1000
      --log-level warning
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: econova-db
          property: connectionString
